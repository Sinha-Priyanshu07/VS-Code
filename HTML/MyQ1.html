<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        table {
            margin: 0;
            padding: 0;
        }

        th {
            border: 5 solid whitesmoke;
            background-color: black;
            color: white;
        }

        td {
            border: 2 solid whitesmoke;
            background-color: black;
            color: white;
        }
    </Style>
</head>
<body>
    <!-- <h2>Student Information</h2> -->
    <table>
        <caption>
            Student Information
        </caption>
        <tr>
            <th rowspan="6">Info</th>
            <th rowspan="2">Name</th>
            <th colspan="2">Address</th>
        </tr>
        <tr>
            <th>City</th>
            <th>House</th>
        </tr>
        <tr>
            <td>A</td>
            <td>Delhi</td>
            <td>1</td>
        </tr>
        <tr>
            <td>B</td>
            <td>Mumbai</td>
            <td>2</td>
        </tr>
        <tr>
            <td> C </td>
            <td> Kolkata </td>
            <td>3</td>
        </tr>
        <tr>
            <td> D </td>
            <td> Pune </td>
            <td> 4 </td>
        </tr>
    </table>
</body>
</html>
