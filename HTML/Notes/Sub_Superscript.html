<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub and Superscript</title>
</head>
<body>
    Sub and Superscript Tags <br>
    <sub>sub</sub> tag is used to create subscript text, <sup>sup</sup>tag is used to create superscript text. <br><br>

    This is normal text. <br>
    This text has subscript: H<sub>2</sub>O. <br>
    This text has superscript: E = mc<sup>2</sup>. <br>
</body>
</html>
