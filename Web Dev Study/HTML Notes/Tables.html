<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>Tables In HTml</h1>
    <!-- 
    Table has two parts
    1. <thead> = header of table (1st Row which has titles like name, class, roll ) 
    2. <tbody> = body of table

    tr = table row
    th = table header
    td = table data

    colspan = an attribute to make a td to occupy more than one cell
    -->

    <table>
        <!-- Header of Table -->
        <thead>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Semester</th>
                <th>Roll</th>
                <th>Marks %</th>
            </tr>
        </thead>

        <!-- Body of Table -->
        <tbody>
            <tr>  <!-- Row 1 -->
                <td>Priyanshu</td>
                <td>BCA</td>
                <td>1</td>
                <td>155</td>
                <td>80</td>
            </tr>

            <tr>  <!-- Row 2 -->
                <td>Pawan</td>
                <td>BCA</td>
                <td>1</td>
                <td>28</td>
                <td>70</td>
            </tr>

            <tr>  <!-- Row 3 -->
                <td>Piyush</td>
                <td>BCA</td>
                <td>1</td>
                <td>109</td>
                <td>75</td>
            </tr>

            <tr> <!-- Colspan use-->
                <td> </td>
                <td colspan="2">Thank YOU</td>
                <td> </td>

            </tr>
        </tbody>
    </table>
    <hr>
<!-- 1.33.19 -->

    <hr>
    This is table <br>
    we can make it nice using CSS

</body>
</html>
