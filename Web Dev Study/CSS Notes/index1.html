<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #id01{
            background-color: aqua;
        }
         .class02{
            background-color: rgb(228, 47, 7);
        }
        .class01{
            background-color: aquamarine;
        }
       
    </style>
</head>
<!-- 
    How to Write CSS(Three Ways)
    1. Using <Style> tag 
    2. Creating a .css file and using <link> tag to link .css file
    3. using 'style' as attribute in tags
-->
<body>
    <div id="id01">
        This is Id attribute 
        can have only one ID for a element(we cant use this id with another element)
        id 01
    </div>
    <div class="class01 class02">
        This is Class attribute
        can have many classes or a class can contain two or more tags
        Class01 and Class02
    </div>
    <div class="class02">
        Class 02
    </div>


</body>
</html>
